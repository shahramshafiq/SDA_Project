<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Hotel Management AI Chatbot</title>
    <link rel="stylesheet" href="/css/style.css"/>
</head>
<body>
<div class="app-wrapper">
    <header class="app-header">
        <div class="header-icon">🏨</div>
        <div>
            <h1>Hotel Management AI Chatbot</h1>
            <p class="subtitle">Your virtual concierge — available 24/7</p>
        </div>
    </header>

    <div class="chat-container">
        <div id="chatMessages" class="chat-messages">
            <div class="message bot">
                <span class="bubble">Hello! Welcome to the Hotel Management System. 
                How can I help you today? Type <strong>help</strong> to see available commands.</span>
                <span class="timestamp" id="initTimestamp"></span>
            </div>
        </div>

        <div class="chat-input-area">
            <input type="text" id="userInput" placeholder="Type your message…" autocomplete="off"/>
            <button id="sendBtn" onclick="sendMessage()">Send</button>
        </div>
    </div>

    <footer class="app-footer">
        <p>SDA Course Project &bull; Shahram Shafiq &bull; Sara Nasir &bull; Taha Jabbar</p>
    </footer>
</div>
<script src="/js/chat.js"></script>
</body>
</html>
